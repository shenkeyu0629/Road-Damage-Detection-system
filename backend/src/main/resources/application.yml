    password: qazwsxasd
  
  data:
    redis:
      host: localhost
      port: 6379
      password: 
      database: 0
      timeout: 10000ms
  
  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB
  
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.roadinspection.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: road-inspection-jwt-secret-key-2024-very-long-secret-key-for-security
  expiration: 86400000
  header: Authorization
  prefix: Bearer

ai-service:
  url: http://localhost:8001
  detection-endpoint: /api/v1/detection
  train-endpoint: /api/v1/train

file:
  upload-path: c:/Users/55120/Desktop/Road Damage Detection/backend/uploads
  result-path: c:/Users/55120/Desktop/Road Damage Detection/backend/results

app:
  storage:
    base-path: c:/Users/55120/Desktop/Road Damage Detection/backend/storage

